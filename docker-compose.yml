services:
  backend:
    image: anireco-back
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    networks:
      - dev

  frontend:
    image: anireco-front
    build: ./frontend
    ports:
      - "3000:80"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:80 || exit 1" ]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3
    depends_on:
      - backend
    networks:
      - dev

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 5
    volumes:
      - db-data:/var/lib/postgresql/data
    env_file:
      - .env
    networks:
      - dev

  qdrant:
    image: qdrant/qdrant
    container_name: anireco_qdrant
    ports:
      - "6333:6333"
    environment:
      COLLECTION_NAME: ${COLLECTION_NAME}
    volumes:
      - ./qdrant_storage:/qdrant/storage
    healthcheck:
      test: [ "CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1" ]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 5
    env_file:
      - .env
    networks:
      - dev

  ngrok:
    container_name: ngrok
    image: ngrok/ngrok:latest
    command: http --url=https://unjeering-augusta-crestfallenly.ngrok-free.dev frontend:80
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    networks:
      - dev
    depends_on:
      frontend:
        condition: service_healthy

  db-creator:
    image: python:3.9-slim
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./scripts/create_dbs.py:/app/create_dbs.py
    env_file:
      - .env
    command: >
      sh -c "pip install psycopg2-binary && python /app/create_dbs.py"
    networks:
      - dev

  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname Admin \
          --role Admin \
          --email admin@example.com || true
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER}:${DB_PASS}@postgres:5432/airflow_db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__FERNET_KEY=YlCImzjge_TeZc7jPJ7Jz3OQLRQqRkFwDVEXHJBKNFM
    env_file:
      - .env
    networks:
      - dev
    depends_on:
      postgres:
        condition: service_healthy
      db-creator:
        condition: service_completed_successfully

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    restart: always
    command: webserver
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER}:${DB_PASS}@postgres:5432/airflow_db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=3d6f45a5fc12445dbac2f59c3b6c7cb1
      - AIRFLOW__CORE__FERNET_KEY=YlCImzjge_TeZc7jPJ7Jz3OQLRQqRkFwDVEXHJBKNFM
      - PYTHONPATH=/opt/airflow
    env_file:
      - .env
    ports:
      - "8085:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./backend:/opt/airflow/backend
      - ./scripts:/opt/airflow/scripts
      - ./src:/opt/airflow/src
      - ./data:/app/data
    networks:
      - dev
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    restart: always
    command: scheduler
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${DB_USER}:${DB_PASS}@postgres:5432/airflow_db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__FERNET_KEY=YlCImzjge_TeZc7jPJ7Jz3OQLRQqRkFwDVEXHJBKNFM
      - PYTHONPATH=/opt/airflow
    env_file:
      - .env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./backend:/opt/airflow/backend
      - ./scripts:/opt/airflow/scripts
      - ./src:/opt/airflow/src
      - ./data:/app/data
    networks:
      - dev
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

volumes:
  db-data:
networks:
  dev:
    driver: bridge
